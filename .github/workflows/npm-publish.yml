name: Publish npm

# Reusable, parameterized npm publish for ANY workspace package.
#
#   Manual:     Actions → "Publish npm" → choose `package` + `dry_run`.
#   Cross-repo: call it as a reusable workflow from another repo:
#     jobs:
#       release:
#         uses: microservices-sh/microservices-sh/.github/workflows/npm-publish.yml@main
#         with: { package: "@microservices-sh/booking", dry_run: false }
#
# Auth is OIDC trusted publishing — NO NPM_TOKEN. Each published package needs a
# trusted publisher configured once on npmjs.com:
#   npmjs.com → package → Settings → Trusted Publisher → GitHub Actions
#     repository: microservices-sh/microservices-sh
#     workflow:   npm-publish.yml
# pnpm has no OIDC support yet (pnpm#9812), so we `pnpm pack` (which rewrites
# workspace:/file: deps into the tarball) then `npm publish` the tarball, which
# does the OIDC token exchange + provenance attestation.

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to publish (pnpm filter / package name)"
        required: true
        type: string
        default: create-microservices-app
      dry_run:
        description: "Dry run (no actual publish)"
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      dry_run:
        required: false
        type: boolean
        default: false

concurrency:
  group: npm-publish-${{ github.ref }}-${{ inputs.package }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish ${{ inputs.package }}
    runs-on: ubuntu-latest
    env:
      PKG: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      # OIDC trusted publishing needs npm >= 11.5.1 (node 22 ships npm 10.x).
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter "$PKG" build

      # pnpm pack rewrites workspace:/file: deps to real versions in the tarball.
      - name: Pack
        run: |
          rm -rf "$RUNNER_TEMP/pkg" && mkdir -p "$RUNNER_TEMP/pkg"
          pnpm --filter "$PKG" pack --pack-destination "$RUNNER_TEMP/pkg"

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: npm publish "$RUNNER_TEMP"/pkg/*.tgz --dry-run --access public

      - name: Publish (OIDC trusted publishing + provenance)
        if: ${{ !inputs.dry_run }}
        run: npm publish "$RUNNER_TEMP"/pkg/*.tgz --provenance --access public
