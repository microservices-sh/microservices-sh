    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // headline in
      tl.fromTo('#reel-3 .r3kicker', { opacity: 0, letterSpacing: "0.62em" }, { opacity: 1, letterSpacing: "0.3em", duration: 0.6, ease: "power2.out" }, 0.25);
      tl.fromTo('#reel-3 .r3headline', { opacity: 0, y: 52 }, { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, 0.42);

      // background structure + grid resolves
      tl.fromTo('#reel-3 .r3grid', { opacity: 0 }, { opacity: 0.5, duration: 1.1, ease: "sine.out" }, 0.5);
      tl.fromTo('#reel-3 .r3glow', { opacity: 0, scale: 0.55 }, { opacity: 1, scale: 1, duration: 1.0, ease: "power2.out" }, 0.7);
      tl.fromTo('#reel-3 .r3outer polygon', { opacity: 0, scale: 0.9 }, { opacity: 0.5, scale: 1, duration: 0.7, ease: "power2.out", stagger: 0.025 }, 0.8);

      // grid cells seat in
      tl.fromTo('#reel-3 .r3cell-base', { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.6)", stagger: 0.07 }, 1.05);
      tl.fromTo('#reel-3 .r3name', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.out", stagger: 0.07 }, 1.25);
      tl.fromTo('#reel-3 .r3tag', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.out", stagger: 0.07 }, 1.4);

      // cells light up in sequence (ignition)
      const litStart = 1.85, litStep = 0.26;
      tl.fromTo('#reel-3 .r3cell-lit', { opacity: 0, scale: 0.94 }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(2)", stagger: litStep }, litStart);
      tl.fromTo('#reel-3 .r3name-lit', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out", stagger: litStep }, litStart + 0.05);

      // hub resolves last
      const hubAt = litStart + litStep * 6;
      tl.fromTo('#reel-3 .r3hub-stroke', { opacity: 0, scale: 0.82 }, { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(2.2)" }, hubAt);
      tl.fromTo('#reel-3 .r3hub-bg', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.out" }, hubAt);
      tl.fromTo('#reel-3 .r3hub-name', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, hubAt + 0.1);
      tl.fromTo('#reel-3 .r3hub-tag', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, hubAt + 0.1);

      // contract chips fade in ONE BY ONE, each with a green glow flash
      tl.fromTo('#reel-3 .r3chip--1', { opacity: 0, y: 28, scale: 0.86 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(2.4)" }, 3.55);
      tl.fromTo('#reel-3 .r3chip--1 .r3chip-fx', { opacity: 0, scale: 0.6 }, { opacity: 0.8, scale: 1.14, duration: 0.3, ease: "power2.out" }, 3.6);
      tl.to('#reel-3 .r3chip--1 .r3chip-fx', { opacity: 0, duration: 0.6, ease: "power2.in" }, 3.92);

      tl.fromTo('#reel-3 .r3chip--2', { opacity: 0, y: 28, scale: 0.86 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(2.4)" }, 4.1);
      tl.fromTo('#reel-3 .r3chip--2 .r3chip-fx', { opacity: 0, scale: 0.6 }, { opacity: 0.8, scale: 1.14, duration: 0.3, ease: "power2.out" }, 4.15);
      tl.to('#reel-3 .r3chip--2 .r3chip-fx', { opacity: 0, duration: 0.6, ease: "power2.in" }, 4.47);

      tl.fromTo('#reel-3 .r3chip--3', { opacity: 0, y: 28, scale: 0.86 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(2.4)" }, 4.65);
      tl.fromTo('#reel-3 .r3chip--3 .r3chip-fx', { opacity: 0, scale: 0.6 }, { opacity: 0.8, scale: 1.14, duration: 0.3, ease: "power2.out" }, 4.7);
      tl.to('#reel-3 .r3chip--3 .r3chip-fx', { opacity: 0, duration: 0.6, ease: "power2.in" }, 5.02);

      // ambient: hub glow breathes (finite)
      tl.to('#reel-3 .r3glow', { opacity: 0.62, scale: 1.06, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 2 }, hubAt + 0.6);

      window.__timelines["reel-3"] = tl;
    </script>
