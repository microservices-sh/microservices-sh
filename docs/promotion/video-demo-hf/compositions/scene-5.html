    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // header
      tl.fromTo('#scene-5 .kicker', { opacity: 0, letterSpacing: "0.6em" }, { opacity: 1, letterSpacing: "0.3em", duration: 0.6, ease: "power2.out" }, 0.25);
      tl.fromTo('#scene-5 .headline', { opacity: 0, y: 46 }, { opacity: 1, y: 0, duration: 0.75, ease: "power3.out" }, 0.4);

      // panels frame in — terminal from left, closed panel from right
      tl.fromTo('#scene-5 .term', { opacity: 0, x: -70, scale: 0.97 }, { opacity: 1, x: 0, scale: 1, duration: 0.8, ease: "expo.out" }, 0.6);
      tl.fromTo('#scene-5 .closed', { opacity: 0, x: 70, scale: 0.97 }, { opacity: 1, x: 0, scale: 1, duration: 0.8, ease: "expo.out" }, 0.7);

      // terminal contents cascade
      tl.fromTo('#scene-5 .l1', { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.4, ease: "power1.out" }, 1.35);

      // the diff-add line — confident pop (focal point, left)
      tl.fromTo('#scene-5 .l2', { opacity: 0, scale: 0.84, x: -8 }, { opacity: 1, scale: 1, x: 0, duration: 0.5, ease: "back.out(2.2)" }, 1.7);
      tl.fromTo('#scene-5 .add-glow', { opacity: 0, scale: 0.92 }, { opacity: 0.95, scale: 1, duration: 0.5, ease: "power2.out" }, 1.85);

      // command + ok rows resolve
      tl.fromTo('#scene-5 .l3', { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.38, ease: "power2.out" }, 2.45);
      tl.fromTo('#scene-5 .l4', { opacity: 0, x: -16 }, { opacity: 1, x: 0, duration: 0.35, ease: "power1.out" }, 2.8);
      tl.fromTo('#scene-5 .l5', { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.45, ease: "back.out(1.7)" }, 3.15);

      // right panel chrome + the big 401 lands with a pop (focal point, right)
      tl.fromTo('#scene-5 .closed-bar', { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 1.55);
      tl.fromTo('#scene-5 .pill', { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.4)" }, 1.95);
      tl.fromTo('#scene-5 .big401-num', { opacity: 0, scale: 0.6, y: 24 }, { opacity: 1, scale: 1, y: 0, duration: 0.7, ease: "back.out(2.0)" }, 2.55);
      tl.fromTo('#scene-5 .big401-glow', { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.6, ease: "power2.out" }, 2.7);
      tl.fromTo('#scene-5 .signin', { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 3.05);
      tl.fromTo('#scene-5 .sub', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "none" }, 3.4);

      // breathe — finite green glow pulse on the lock/verified beat (the 401 glow)
      tl.to('#scene-5 .big401-glow', { opacity: 0.55, scale: 1.06, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 3 }, 4.2);

      window.__timelines["scene-5"] = tl;
    </script>
