name: Publish npm

# Parameterized npm publish for ANY workspace package.
#
#   Manual:  Actions → "Publish npm" → choose `package` + `dry_run`.
#   Tag:     push a `<package>@<version>` tag → real publish of that package:
#              git tag create-microservices-app@0.2.4
#              git push origin create-microservices-app@0.2.4
#            (scoped names work: `@microservices-sh/module-contract@0.1.1`)
#
# Auth is OIDC trusted publishing — NO NPM_TOKEN. Each published package needs a
# trusted publisher configured once on npmjs.com:
#   npmjs.com → package → Settings → Trusted Publisher → GitHub Actions
#     repository: microservices-sh/microservices-sh
#     workflow:   npm-publish.yml
#
# IMPORTANT: npm matches the OIDC token's TOP-LEVEL workflow (`workflow_ref`),
# not a reusable workflow's `job_workflow_ref`. So the publish MUST be triggered
# directly on THIS file (manual dispatch or the tag push above). A wrapper
# workflow that `uses:` this file as reusable would publish with the wrapper as
# the top-level workflow and get a 404 — which is why the tag trigger lives here
# rather than in a separate release.yml.
#
# pnpm has no OIDC support yet (pnpm#9812), so we `pnpm pack` (which rewrites
# workspace:/file: deps into the tarball) then `npm publish` the tarball, which
# does the OIDC token exchange + provenance attestation.

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to publish (pnpm filter / package name)"
        required: true
        type: string
        default: create-microservices-app
      dry_run:
        description: "Dry run (no actual publish)"
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "*@*"

concurrency:
  group: npm-publish-${{ github.ref }}-${{ inputs.package || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Resolve the target package + dry-run flag across both triggers:
      #   tag push      → parse `<package>` from the tag, real publish
      #   manual dispatch → use the inputs
      - name: Resolve target
        env:
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          IN_PKG: ${{ inputs.package }}
          IN_DRY: ${{ inputs.dry_run }}
        run: |
          if [ "$EVENT" = "push" ]; then
            echo "PKG=${REF_NAME%@*}" >> "$GITHUB_ENV"
            echo "DRY=false" >> "$GITHUB_ENV"
          else
            echo "PKG=$IN_PKG" >> "$GITHUB_ENV"
            echo "DRY=$IN_DRY" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # setup-node@v5 caches the pnpm store by default, but pnpm isn't on
          # PATH until corepack runs below — disable to avoid "pnpm not found".
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      # OIDC trusted publishing needs npm >= 11.5.1 (node 22 ships npm 10.x).
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter "$PKG" build

      # pnpm pack rewrites workspace:/file: deps to real versions in the tarball.
      - name: Pack
        run: |
          rm -rf "$RUNNER_TEMP/pkg" && mkdir -p "$RUNNER_TEMP/pkg"
          pnpm --filter "$PKG" pack --pack-destination "$RUNNER_TEMP/pkg"

      - name: Publish (dry run)
        if: ${{ env.DRY == 'true' }}
        run: npm publish "$RUNNER_TEMP"/pkg/*.tgz --dry-run --access public

      - name: Publish (OIDC trusted publishing + provenance)
        if: ${{ env.DRY != 'true' }}
        run: npm publish "$RUNNER_TEMP"/pkg/*.tgz --provenance --access public
