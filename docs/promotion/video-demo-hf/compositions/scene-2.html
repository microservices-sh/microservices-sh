<template id="scene-2-template">
  <div id="scene-2" data-composition-id="scene-2" data-width="1920" data-height="1080">
    <div class="scene-content">
      <!-- background layers -->
      <div class="bg-glow" aria-hidden="true"></div>
      <svg class="hive-ghost" viewBox="0 0 600 600" aria-hidden="true">
        <path d="M300 60 L470 158 L470 354 L300 452 L130 354 L130 158 Z" />
        <path d="M300 160 L385 209 L385 307 L300 356 L215 307 L215 209 Z" />
      </svg>
      <span class="reg reg--tl" aria-hidden="true">+ studio</span>
      <span class="reg reg--br" aria-hidden="true">microservices ▸ the 30%</span>

      <!-- header zone -->
      <div class="head">
        <span class="kicker">STEP 02 · THE DANGEROUS 30%</span>
        <h1 class="headline">The 30% it quietly gets&nbsp;wrong.</h1>
      </div>

      <!-- failure grid -->
      <div class="grid">
        <!-- CARD 1 — open admin route -->
        <div class="card card1">
          <div class="card-top">
            <span class="icon-box"><span class="fx"></span>
              <svg class="ico" viewBox="0 0 32 32" aria-hidden="true">
                <rect x="7" y="14" width="18" height="13" rx="2.5" />
                <path class="ico-draw" d="M11 14 V10 a5 5 0 0 1 9.4 -2.3" />
                <circle cx="16" cy="20" r="1.7" />
                <path d="M16 21.7 V23.7" />
              </svg>
            </span>
            <span class="card-tag">AUTH · ROUTING</span>
          </div>
          <h2 class="card-title">Open admin route</h2>
          <div class="code">
            <div class="cline"><span class="cmuted">GET</span> <span class="cpath">/admin</span></div>
            <div class="cline">→ <span class="cdanger">200 OK</span> · no auth</div>
          </div>
          <p class="note">the agent forgot to gate it</p>
        </div>

        <!-- CARD 2 — double charge -->
        <div class="card card2">
          <div class="card-top">
            <span class="icon-box"><span class="fx"></span>
              <svg class="ico" viewBox="0 0 32 32" aria-hidden="true">
                <rect x="9" y="6" width="20" height="13" rx="2.5" />
                <rect class="solid" x="4" y="11" width="20" height="14" rx="2.5" />
                <path class="ico-draw" d="M4 16 H24" />
                <path d="M7.5 21 H13.5" />
              </svg>
            </span>
            <span class="card-tag">PAYMENTS</span>
          </div>
          <h2 class="card-title">Double charge</h2>
          <div class="code">
            <div class="cline"><span class="cgreen">charge.succeeded</span></div>
            <div class="cline"><span class="cgreen">charge.succeeded</span> <span class="camber">⤺ retry</span></div>
            <div class="cline"><span class="cmuted">−$150.00</span> &nbsp;<span class="cdanger">−$150.00 ✗</span></div>
          </div>
          <p class="note">no idempotency key</p>
        </div>

        <!-- CARD 3 — tenant leak -->
        <div class="card card3">
          <div class="card-top">
            <span class="icon-box"><span class="fx"></span>
              <svg class="ico" viewBox="0 0 32 32" aria-hidden="true">
                <ellipse cx="13" cy="8" rx="9" ry="3.2" />
                <path d="M4 8 V20 a9 3.2 0 0 0 18 0 V8" />
                <path d="M4 14 a9 3.2 0 0 0 18 0" />
                <path class="ico-draw" d="M23.5 12 H29.5 M27 9.5 L29.5 12 L27 14.5" />
              </svg>
            </span>
            <span class="card-tag">MULTI-TENANCY</span>
          </div>
          <h2 class="card-title">Tenant leak</h2>
          <div class="code">
            <div class="cline"><span class="cgreen">SELECT *</span> FROM bookings</div>
            <div class="cline"><span class="camber">-- missing WHERE org_id</span></div>
            <div class="cline">org_A · <span class="cdanger">org_B ✗</span></div>
          </div>
          <p class="note">cross-tenant read</p>
        </div>
      </div>
    </div>

    <style>
      @font-face { font-family: "Bricolage Grotesque"; font-weight: 800; font-display: block; src: url("../fonts/bricolage-800.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 400; font-display: block; src: url("../fonts/hanken-400.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 600; font-display: block; src: url("../fonts/hanken-600.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 400; font-display: block; src: url("../fonts/plexmono-400.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 600; font-display: block; src: url("../fonts/plexmono-600.woff2") format("woff2"); }

      #scene-2 { position: absolute; inset: 0; background: #070a08; font-family: "Hanken Grotesk", sans-serif; overflow: hidden; }
      #scene-2 .scene-content { position: relative; width: 100%; height: 100%; box-sizing: border-box; padding: 90px 110px; display: flex; flex-direction: column; gap: 54px; }

      /* background */
      #scene-2 .bg-glow { position: absolute; left: 50%; top: -260px; width: 1300px; height: 1300px; transform: translateX(-50%); background: radial-gradient(circle, rgba(255, 107, 94, 0.15), rgba(255, 200, 87, 0.07) 38%, rgba(7, 10, 8, 0) 64%); pointer-events: none; }
      #scene-2 .hive-ghost { position: absolute; right: -180px; top: -150px; width: 720px; height: 720px; fill: none; stroke: #2a3c30; stroke-width: 3; opacity: 0.5; pointer-events: none; }
      #scene-2 .reg { position: absolute; font-family: "IBM Plex Mono", monospace; font-size: 20px; letter-spacing: 0.16em; color: #5e7568; text-transform: uppercase; }
      #scene-2 .reg--tl { left: 110px; top: 52px; }
      #scene-2 .reg--br { right: 110px; bottom: 52px; }

      /* header */
      #scene-2 .head { display: flex; flex-direction: column; gap: 18px; }
      #scene-2 .kicker { font-family: "IBM Plex Mono", monospace; font-size: 24px; letter-spacing: 0.3em; color: #ffc857; }
      #scene-2 .headline { margin: 0; font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 66px; letter-spacing: -0.015em; color: #eafbf1; line-height: 1.02; }

      /* grid */
      #scene-2 .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 34px; flex: 1; min-height: 0; }
      #scene-2 .card { position: relative; display: flex; flex-direction: column; gap: 22px; background: #0b0f0c; border: 2px solid rgba(255, 107, 94, 0.42); border-radius: 14px; padding: 32px; box-shadow: 0 44px 110px -36px rgba(0, 0, 0, 0.82), 0 0 70px -34px rgba(255, 107, 94, 0.22); }
      #scene-2 .card2 { border-color: rgba(255, 200, 87, 0.42); box-shadow: 0 44px 110px -36px rgba(0, 0, 0, 0.82), 0 0 70px -34px rgba(255, 200, 87, 0.22); }

      /* card top: svg icon tile + domain tag */
      #scene-2 .card-top { display: flex; align-items: center; justify-content: space-between; }
      #scene-2 .icon-box { position: relative; width: 70px; height: 70px; border-radius: 16px; border: 2px solid; display: grid; place-items: center; }
      #scene-2 .icon-box .fx { position: absolute; inset: -7px; border-radius: 20px; opacity: 0; pointer-events: none; }
      #scene-2 .card1 .icon-box, #scene-2 .card3 .icon-box { color: #ff6b5e; border-color: rgba(255, 107, 94, 0.5); background: rgba(255, 107, 94, 0.08); }
      #scene-2 .card2 .icon-box { color: #ffc857; border-color: rgba(255, 200, 87, 0.5); background: rgba(255, 200, 87, 0.08); }
      #scene-2 .card1 .fx, #scene-2 .card3 .fx { background: radial-gradient(circle, rgba(255, 107, 94, 0.5), rgba(255, 107, 94, 0) 66%); }
      #scene-2 .card2 .fx { background: radial-gradient(circle, rgba(255, 200, 87, 0.5), rgba(255, 200, 87, 0) 66%); }
      #scene-2 .ico { width: 42px; height: 42px; display: block; }
      #scene-2 .ico rect, #scene-2 .ico path, #scene-2 .ico ellipse, #scene-2 .ico circle { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      #scene-2 .ico .solid { fill: #0b0f0c; }
      #scene-2 .card-tag { font-family: "IBM Plex Mono", monospace; font-size: 18px; letter-spacing: 0.14em; color: #ff8a80; }
      #scene-2 .card2 .card-tag { color: #ffd277; }

      #scene-2 .card-title { margin: 0; font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -0.01em; color: #eafbf1; }
      #scene-2 .code { display: flex; flex-direction: column; gap: 10px; background: #0f1511; border: 2px solid #1d2a22; border-radius: 10px; padding: 22px 24px; font-family: "IBM Plex Mono", monospace; font-size: 28px; line-height: 1.35; color: #91a89a; }
      #scene-2 .cline { white-space: nowrap; }
      #scene-2 .cmuted { color: #91a89a; }
      #scene-2 .cpath { color: #eafbf1; }
      #scene-2 .cgreen { color: #9fffc2; }
      #scene-2 .camber { color: #ffc857; }
      #scene-2 .cdanger { color: #ff6b5e; font-weight: 600; }
      #scene-2 .note { margin: 0; margin-top: auto; font-family: "Hanken Grotesk", sans-serif; font-weight: 600; font-size: 24px; color: #ff6b5e; }
      #scene-2 .card2 .note { color: #ffc857; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // background settles first — slow honeycomb drift in
      tl.fromTo('#scene-2 .hive-ghost', { opacity: 0, rotate: -8, transformOrigin: "70% 30%" }, { opacity: 0.5, rotate: 0, duration: 0.7, ease: "sine.out" }, 0.2);
      tl.fromTo('#scene-2 .bg-glow', { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.6, ease: "power1.out" }, 0.25);

      // header — kicker tightens, headline lifts
      tl.fromTo('#scene-2 .kicker', { opacity: 0, letterSpacing: "0.6em" }, { opacity: 1, letterSpacing: "0.3em", duration: 0.55, ease: "power2.out" }, 0.35);
      tl.fromTo('#scene-2 .headline', { opacity: 0, y: 46 }, { opacity: 1, y: 0, duration: 0.65, ease: "power3.out" }, 0.5);

      // corner metadata marks
      tl.fromTo('#scene-2 .reg--tl', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "none" }, 0.7);
      tl.fromTo('#scene-2 .reg--br', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "none" }, 0.85);

      // the three failure cards stagger in — varied scale/y/direction
      tl.fromTo('#scene-2 .card1', { opacity: 0, y: 60, scale: 0.94 }, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.7)" }, 1.05);
      tl.fromTo('#scene-2 .card2', { opacity: 0, y: 74, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "expo.out" }, 1.17);
      tl.fromTo('#scene-2 .card3', { opacity: 0, y: 60, scale: 0.94 }, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.7)" }, 1.29);

      // svg icon tiles pop in with a glow flash + the icon's key stroke draws
      tl.fromTo('#scene-2 .card1 .icon-box', { opacity: 0, scale: 0.5, transformOrigin: "center" }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.6)" }, 1.3);
      tl.fromTo('#scene-2 .card1 .fx', { opacity: 0, scale: 0.6 }, { opacity: 0.85, scale: 1.16, duration: 0.3, ease: "power2.out" }, 1.34);
      tl.to('#scene-2 .card1 .fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 1.66);

      tl.fromTo('#scene-2 .card2 .icon-box', { opacity: 0, scale: 0.5, transformOrigin: "center" }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.6)" }, 1.45);
      tl.fromTo('#scene-2 .card2 .fx', { opacity: 0, scale: 0.6 }, { opacity: 0.85, scale: 1.16, duration: 0.3, ease: "power2.out" }, 1.49);
      tl.to('#scene-2 .card2 .fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 1.81);

      tl.fromTo('#scene-2 .card3 .icon-box', { opacity: 0, scale: 0.5, transformOrigin: "center" }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.6)" }, 1.6);
      tl.fromTo('#scene-2 .card3 .fx', { opacity: 0, scale: 0.6 }, { opacity: 0.85, scale: 1.16, duration: 0.3, ease: "power2.out" }, 1.64);
      tl.to('#scene-2 .card3 .fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 1.96);

      // domain tags fade in
      tl.fromTo('#scene-2 .card-tag', { opacity: 0, x: 12 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out", stagger: 0.12 }, 1.55);

      // code blocks resolve a touch after their cards land
      tl.fromTo('#scene-2 .code', { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out", stagger: 0.1 }, 1.95);

      // danger notes punch in last — the verdict on each card
      tl.fromTo('#scene-2 .note', { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.32, ease: "power1.out", stagger: 0.1 }, 2.45);

      // breathe — the warm glow swells once on the hold (finite yoyo)
      tl.to('#scene-2 .bg-glow', { opacity: 0.78, scale: 1.05, duration: 1.1, ease: "sine.inOut", yoyo: true, repeat: 3 }, 3.3);

      window.__timelines["scene-2"] = tl;
    </script>
  </div>
</template>
