  <div id="reel-1" data-composition-id="reel-1" data-width="1080" data-height="1920">
    <div class="scene-content">
      <!-- background layers -->

      <svg class="hive-ghost" viewBox="0 0 600 600" aria-hidden="true">
        <path d="M300 40 L490 150 L490 370 L300 480 L110 370 L110 150 Z" />
        <path d="M300 150 L395 205 L395 315 L300 370 L205 315 L205 205 Z" />

    <style>
      @font-face { font-family: "Bricolage Grotesque"; font-weight: 800; font-display: block; src: url("../fonts/bricolage-800.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 400; font-display: block; src: url("../fonts/hanken-400.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 600; font-display: block; src: url("../fonts/hanken-600.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 400; font-display: block; src: url("../fonts/plexmono-400.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 600; font-display: block; src: url("../fonts/plexmono-600.woff2") format("woff2"); }

      #reel-1 {
        position: absolute;
        inset: 0;
        background: #070a08;
        font-family: "Hanken Grotesk", sans-serif;
        overflow: hidden;
      }
      #reel-1 .scene-content {
        position: relative;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 120px 70px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 42px;
      }

      /* background — centered radial green glow */
      #reel-1 .bg-glow {
        position: absolute;

      #reel-1 .hive-ghost {

        margin: 6px 0 0;

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // background settles in first — slow, atmospheric
      tl.fromTo('#reel-1 .bg-glow', { opacity: 0, scale: 0.86 }, { opacity: 1, scale: 1, duration: 1.4, ease: "sine.out" }, 0.2);
      tl.fromTo('#reel-1 .hive-ghost', { opacity: 0, rotation: -6, scale: 0.92, transformOrigin: "50% 50%" }, { opacity: 0.45, rotation: 0, scale: 1, duration: 1.3, ease: "power1.out" }, 0.3);

      // corner marks fade in (opacity-only)
      tl.fromTo('#reel-1 .reg--tl', { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "none" }, 0.5);
      tl.fromTo('#reel-1 .reg--br', { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "none" }, 0.7);

      // kicker — letter-spacing tighten
      tl.fromTo('#reel-1 .kicker', { opacity: 0, letterSpacing: "0.62em" }, { opacity: 1, letterSpacing: "0.3em", duration: 0.7, ease: "power2.out" }, 0.45);

      // hero setup line — confident rise from below
      tl.fromTo('#reel-1 .hero', { opacity: 0, y: 56 }, { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, 0.7);

      // the twist payoff — green glow flash, then the line POPS in (~1.6s later than hero)
      tl.fromTo('#reel-1 .twist-flash', { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" }, 2.25);
      tl.fromTo('#reel-1 .twist', { opacity: 0, scale: 0.72, y: 14 }, { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "back.out(2.4)" }, 2.35);

      // caret reveals just after the twist lands
      tl.fromTo('#reel-1 .caret', { opacity: 0, scaleY: 0, transformOrigin: "center bottom" }, { opacity: 1, scaleY: 1, duration: 0.32, ease: "power2.out" }, 2.85);

      // supporting line eases up last
      tl.fromTo('#reel-1 .support', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.55, ease: "power2.out" }, 3.2);

      // breathe — caret blinks (finite, terminal-style) + glow flash settles to a steady hold
      tl.to('#reel-1 .twist-flash', { opacity: 0.55, scale: 1.02, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 3 }, 3.6);
      tl.to('#reel-1 .caret', { opacity: 0.15, duration: 0.45, ease: "steps(1)", yoyo: true, repeat: 5 }, 3.7);

      window.__timelines["reel-1"] = tl;
    </script>
