name: Release

# Tag-driven publish. Bump a package version, then push a git tag named
# `<package>@<version>` (e.g. `create-microservices-app@0.2.4` or
# `@microservices-sh/module-contract@0.1.1`). This parses the package name out
# of the tag and hands off to the proven OIDC publisher (npm-publish.yml), which
# is the workflow npmjs trusted publishing is bound to — so the real publish
# MUST run there, not inline here.
#
#   git tag create-microservices-app@0.2.4
#   git push origin create-microservices-app@0.2.4

on:
  push:
    tags:
      - "*@*"

permissions:
  contents: read
  id-token: write

jobs:
  parse:
    name: parse package from tag
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.parse.outputs.package }}
    steps:
      # Strip the trailing `@<version>` — works for scoped names too:
      #   @microservices-sh/module-contract@0.1.1 -> @microservices-sh/module-contract
      #   create-microservices-app@0.2.4          -> create-microservices-app
      - id: parse
        env:
          TAG: ${{ github.ref_name }}
        run: echo "package=${TAG%@*}" >> "$GITHUB_OUTPUT"

  publish:
    name: publish ${{ needs.parse.outputs.package }}
    needs: parse
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/npm-publish.yml
    with:
      package: ${{ needs.parse.outputs.package }}
      dry_run: false
