      tl.fromTo('#scene-6 .s6tag', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.out", stagger: 0.08 }, 1.3);

      // each module lights up in sequence (no connector lines — the ignition carries it)
      const litStart = 1.7, litStep = 0.32;
      tl.fromTo('#scene-6 .s6cell-lit', { opacity: 0, scale: 0.94, transformOrigin: "center" }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(2)", stagger: litStep }, litStart);
      tl.fromTo('#scene-6 .s6name-lit', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out", stagger: litStep }, litStart + 0.05);

      // hub resolves last + finite breathe
      const hubAt = litStart + litStep * 6;
      tl.fromTo('#scene-6 .s6hub-stroke', { opacity: 0, scale: 0.82, transformOrigin: "center" }, { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(2.2)" }, hubAt);
      tl.fromTo('#scene-6 .s6hub-bg', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.out" }, hubAt);
      tl.fromTo('#scene-6 .s6hub-name', { opacity: 0 }, { opacity: 1, duration: 0.4 }, hubAt + 0.1);
      tl.fromTo('#scene-6 .s6hub-tag', { opacity: 0 }, { opacity: 1, duration: 0.4 }, hubAt + 0.1);

      // contract chips fade in ONE BY ONE — each pops with a green glow flash (eye-catch)
      tl.fromTo('#scene-6 .s6chip--1', { opacity: 0, x: -32, scale: 0.86 }, { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "back.out(2.4)" }, 2.7);
      tl.fromTo('#scene-6 .s6chip--1 .s6chip-fx', { opacity: 0, scale: 0.6 }, { opacity: 0.75, scale: 1.12, duration: 0.3, ease: "power2.out" }, 2.74);
      tl.to('#scene-6 .s6chip--1 .s6chip-fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 3.06);

      tl.fromTo('#scene-6 .s6chip--2', { opacity: 0, x: -32, scale: 0.86 }, { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "back.out(2.4)" }, 3.2);
      tl.fromTo('#scene-6 .s6chip--2 .s6chip-fx', { opacity: 0, scale: 0.6 }, { opacity: 0.75, scale: 1.12, duration: 0.3, ease: "power2.out" }, 3.24);
      tl.to('#scene-6 .s6chip--2 .s6chip-fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 3.56);

      tl.fromTo('#scene-6 .s6chip--3', { opacity: 0, x: -32, scale: 0.86 }, { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "back.out(2.4)" }, 3.7);
      tl.fromTo('#scene-6 .s6chip--3 .s6chip-fx', { opacity: 0, scale: 0.6 }, { opacity: 0.75, scale: 1.12, duration: 0.3, ease: "power2.out" }, 3.74);
      tl.to('#scene-6 .s6chip--3 .s6chip-fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 4.06);

      // ambient: hub glow breathes (finite)
      tl.to('#scene-6 .s6glow', { opacity: 0.6, scale: 1.06, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 2 }, hubAt + 0.7);
