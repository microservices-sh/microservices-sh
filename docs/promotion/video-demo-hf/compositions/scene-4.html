<template id="scene-4-template">
  <div id="scene-4" data-composition-id="scene-4" data-width="1920" data-height="1080">
    <div class="scene-content">
      <!-- background layers -->
      <div class="bg-glow" aria-hidden="true"></div>
      <svg class="hive-ghost" viewBox="0 0 600 600" aria-hidden="true">
        <path d="M300 60 L470 158 L470 354 L300 452 L130 354 L130 158 Z" />
        <path d="M300 160 L385 209 L385 307 L300 356 L215 307 L215 209 Z" />
      </svg>
      <span class="reg reg--tl" aria-hidden="true">+ studio</span>
      <span class="reg reg--br" aria-hidden="true">microservices ▸ check</span>

      <!-- header zone -->
      <div class="head">
        <span class="kicker">STEP 04 · VERIFY</span>
        <h1 class="headline">Every contract gets&nbsp;checked.</h1>
      </div>

      <!-- terminal -->
      <div class="term">
        <div class="term-bar">
          <span class="dots"><i></i><i></i><i></i></span>
          <span class="term-title">studio ▸ pnpm microservices check</span>
        </div>
        <div class="term-body">
          <div class="row row--prompt"><span class="arrow">❯</span><span class="prog">pnpm</span><span class="args">&nbsp;microservices check</span></div>
          <div class="row row--ok r1"><span class="ic ic--ok">✓</span><span class="rk">contracts</span><span class="rv">12 typed calls resolve</span></div>
          <div class="row row--fail r2">
            <span class="x-glow" aria-hidden="true"></span>
            <span class="ic ic--fail">✗</span><span class="rk">permissions</span><span class="rv">auth: <b>/admin</b> route is not gated</span>
          </div>
          <div class="row row--ok r3"><span class="ic ic--ok">✓</span><span class="rk">idempotency</span><span class="rv">payments safe to retry</span></div>
          <div class="row row--ok r4"><span class="ic ic--ok">✓</span><span class="rk">tenant isolation</span><span class="rv">every query org-scoped</span></div>
          <div class="divider"></div>
          <div class="banner"><span class="banner-ic">▲</span><span>1 contract failed · <b>build blocked</b></span></div>
        </div>
      </div>
    </div>

    <style>
      @font-face { font-family: "Bricolage Grotesque"; font-weight: 800; font-display: block; src: url("../fonts/bricolage-800.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 400; font-display: block; src: url("../fonts/hanken-400.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 600; font-display: block; src: url("../fonts/hanken-600.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 400; font-display: block; src: url("../fonts/plexmono-400.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 600; font-display: block; src: url("../fonts/plexmono-600.woff2") format("woff2"); }

      #scene-4 {
        position: absolute;
        inset: 0;
        background: #070a08;
        font-family: "Hanken Grotesk", sans-serif;
        overflow: hidden;
      }
      #scene-4 .scene-content {
        position: relative;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 92px 110px;
        display: flex;
        flex-direction: column;
        gap: 48px;
      }

      /* background */
      #scene-4 .bg-glow {
        position: absolute;
        right: -160px;
        top: 220px;
        width: 1100px;
        height: 1100px;
        background: radial-gradient(circle, rgba(255, 107, 94, 0.16), rgba(7, 10, 8, 0) 60%);
        pointer-events: none;
      }
      #scene-4 .hive-ghost {
        position: absolute;
        left: -120px;
        bottom: -160px;
        width: 760px;
        height: 760px;
        fill: none;
        stroke: #2a3c30;
        stroke-width: 3;
        opacity: 0.5;
        pointer-events: none;
      }
      #scene-4 .reg {
        position: absolute;
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        letter-spacing: 0.16em;
        color: #5e7568;
        text-transform: uppercase;
      }
      #scene-4 .reg--tl { left: 110px; top: 52px; }
      #scene-4 .reg--br { right: 110px; bottom: 52px; }

      /* header */
      #scene-4 .head { display: flex; flex-direction: column; gap: 18px; }
      #scene-4 .kicker {
        font-family: "IBM Plex Mono", monospace;
        font-size: 24px;
        letter-spacing: 0.3em;
        color: #38ff88;
      }
      #scene-4 .headline {
        margin: 0;
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 66px;
        letter-spacing: -0.015em;
        color: #eafbf1;
        line-height: 1.02;
      }

      /* terminal */
      #scene-4 .term {
        position: relative;
        background: #0b0f0c;
        border: 2px solid #2a3c30;
        border-radius: 16px;
        box-shadow: 0 50px 130px -30px rgba(0, 0, 0, 0.85), 0 0 90px -30px rgba(56, 255, 136, 0.18);
        overflow: hidden;
      }
      #scene-4 .term-bar {
        display: flex;
        align-items: center;
        gap: 22px;
        padding: 20px 30px;
        background: #0f1511;
        border-bottom: 2px solid #1d2a22;
      }
      #scene-4 .dots { display: inline-flex; gap: 11px; }
      #scene-4 .dots i {
        width: 16px; height: 16px; border-radius: 999px; background: #2a3c30; display: block;
      }
      #scene-4 .term-title {
        font-family: "IBM Plex Mono", monospace;
        font-size: 24px;
        color: #91a89a;
      }
      #scene-4 .term-body {
        padding: 38px 44px 42px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 34px;
        line-height: 1.4;
      }
      #scene-4 .row { display: flex; align-items: baseline; gap: 22px; }
      #scene-4 .row--prompt { color: #eafbf1; margin-bottom: 6px; }
      #scene-4 .arrow { color: #38ff88; font-weight: 600; }
      #scene-4 .prog { color: #9fffc2; }
      #scene-4 .args { color: #91a89a; }
      #scene-4 .ic { width: 36px; flex: 0 0 36px; text-align: center; font-weight: 700; }
      #scene-4 .ic--ok { color: #38ff88; }
      #scene-4 .ic--fail { color: #ff6b5e; }
      #scene-4 .rk { width: 330px; flex: 0 0 330px; color: #5e7568; }
      #scene-4 .rv { color: #9fffc2; }
      #scene-4 .row--fail .rv { color: #ffb3ab; }
      #scene-4 .row--fail .rk { color: #ff8a80; }
      #scene-4 .row--fail .rv b { color: #ff6b5e; }
      #scene-4 .row--fail {
        position: relative;
        margin: 4px -16px;
        padding: 12px 16px;
        border-radius: 10px;
        background: rgba(255, 107, 94, 0.08);
      }
      #scene-4 .x-glow {
        position: absolute;
        inset: -2px -10px;
        border-radius: 12px;
        background: radial-gradient(ellipse at 8% 50%, rgba(255, 107, 94, 0.3), rgba(255, 107, 94, 0) 55%);
        pointer-events: none;
        opacity: 0;
        z-index: 0;
      }
      #scene-4 .row--fail .ic,
      #scene-4 .row--fail .rk,
      #scene-4 .row--fail .rv { position: relative; z-index: 1; }
      #scene-4 .divider { height: 2px; background: #1d2a22; margin: 14px 0 6px; }
      #scene-4 .banner {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        align-self: flex-start;
        padding: 16px 26px;
        border: 2px solid rgba(255, 107, 94, 0.5);
        border-radius: 12px;
        background: rgba(255, 107, 94, 0.12);
        color: #ffb3ab;
        font-size: 34px;
      }
      #scene-4 .banner b { color: #ff6b5e; font-weight: 700; }
      #scene-4 .banner-ic { color: #ff6b5e; font-size: 30px; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // header
      tl.fromTo('#scene-4 .kicker', { opacity: 0, letterSpacing: "0.6em" }, { opacity: 1, letterSpacing: "0.3em", duration: 0.6, ease: "power2.out" }, 0.2);
      tl.fromTo('#scene-4 .headline', { opacity: 0, y: 48 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.35);

      // terminal frame
      tl.fromTo('#scene-4 .term', { opacity: 0, y: 60, scale: 0.97 }, { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "expo.out" }, 0.55);
      tl.fromTo('#scene-4 .term-bar', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "none" }, 1.0);

      // prompt + first ok row cascade
      tl.fromTo('#scene-4 .row--prompt', { opacity: 0, x: -24 }, { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" }, 1.3);
      tl.fromTo('#scene-4 .r1', { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.35, ease: "power1.out" }, 1.75);

      // the catch — the ✗ row SLAMS in (the hero beat)
      tl.fromTo('#scene-4 .r2', { opacity: 0, scale: 0.82, x: -10 }, { opacity: 1, scale: 1, x: 0, duration: 0.42, ease: "back.out(2.2)" }, 2.25);
      tl.fromTo('#scene-4 .x-glow', { opacity: 0, scale: 0.9 }, { opacity: 0.9, scale: 1, duration: 0.45, ease: "power2.out" }, 2.35);

      // remaining ok rows resolve after the catch
      tl.fromTo('#scene-4 .r3', { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.35, ease: "power1.out" }, 2.85);
      tl.fromTo('#scene-4 .r4', { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.35, ease: "power1.out" }, 3.1);

      // divider + verdict banner
      tl.fromTo('#scene-4 .divider', { scaleX: 0, transformOrigin: "left center" }, { scaleX: 1, duration: 0.5, ease: "power2.inOut" }, 3.55);
      tl.fromTo('#scene-4 .banner', { opacity: 0, y: 22, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.45, ease: "back.out(1.8)" }, 3.9);

      // breathe — danger glow pulses on the caught row
      tl.to('#scene-4 .x-glow', { opacity: 0.5, scale: 1.04, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 3 }, 4.6);

      window.__timelines["scene-4"] = tl;
    </script>
  </div>
</template>
