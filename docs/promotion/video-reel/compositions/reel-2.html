<template id="reel-2-template">
  <div id="reel-2" data-composition-id="reel-2" data-width="1080" data-height="1920">
    <div class="scene-content">
      <!-- background layers -->
      <div class="bg-glow" aria-hidden="true"></div>
      <svg class="hive-ghost" viewBox="0 0 600 600" aria-hidden="true">
        <path d="M300 60 L470 158 L470 354 L300 452 L130 354 L130 158 Z" />
        <path d="M300 160 L385 209 L385 307 L300 356 L215 307 L215 209 Z" />
      </svg>
      <span class="reg reg--tl" aria-hidden="true">+ reel · 02</span>
      <span class="reg reg--br" aria-hidden="true">the dangerous 30%</span>

      <!-- header zone -->
      <div class="head">
        <span class="kicker">THE DANGEROUS 30%</span>
        <h1 class="headline">The 30% it quietly gets&nbsp;wrong.</h1>
      </div>

      <!-- vertical failure stack -->
      <div class="stack">
        <!-- ROW 1 — open admin route -->
        <div class="row row1">
          <span class="icon-box"><span class="fx"></span>
            <svg class="ico" viewBox="0 0 32 32" aria-hidden="true">
              <rect x="7" y="14" width="18" height="13" rx="2.5" />
              <path d="M11 14 V10 a5 5 0 0 1 9.4 -2.3" />
              <circle cx="16" cy="20" r="1.7" />
              <path d="M16 21.7 V23.7" />
            </svg>
          </span>
          <div class="row-body">
            <h2 class="row-title">Open admin route</h2>
            <div class="code">
              <span class="cmuted">GET</span> <span class="cpath">/admin</span> → <span class="cdanger">200 OK</span> · no auth
            </div>
            <p class="note">agent forgot to gate it</p>
          </div>
        </div>

        <!-- ROW 2 — double charge -->
        <div class="row row2">
          <span class="icon-box"><span class="fx"></span>
            <svg class="ico" viewBox="0 0 32 32" aria-hidden="true">
              <rect x="9" y="6" width="20" height="13" rx="2.5" />
              <rect class="solid" x="4" y="11" width="20" height="14" rx="2.5" />
              <path d="M4 16 H24" />
              <path d="M7.5 21 H13.5" />
            </svg>
          </span>
          <div class="row-body">
            <h2 class="row-title">Double charge</h2>
            <div class="code">
              <span class="cgreen">charge.succeeded</span> <span class="camber">×2</span> → <span class="cdanger">−$300</span>
            </div>
            <p class="note">no idempotency key</p>
          </div>
        </div>

        <!-- ROW 3 — tenant leak -->
        <div class="row row3">
          <span class="icon-box"><span class="fx"></span>
            <svg class="ico" viewBox="0 0 32 32" aria-hidden="true">
              <ellipse cx="13" cy="8" rx="9" ry="3.2" />
              <path d="M4 8 V20 a9 3.2 0 0 0 18 0 V8" />
              <path d="M4 14 a9 3.2 0 0 0 18 0" />
              <path d="M23.5 12 H29.5 M27 9.5 L29.5 12 L27 14.5" />
            </svg>
          </span>
          <div class="row-body">
            <h2 class="row-title">Tenant leak</h2>
            <div class="code">
              <span class="cgreen">SELECT *</span> FROM bookings <span class="camber">(no org_id)</span>
            </div>
            <p class="note">cross-tenant read</p>
          </div>
        </div>
      </div>
    </div>

    <style>
      @font-face { font-family: "Bricolage Grotesque"; font-weight: 800; font-display: block; src: url("../fonts/bricolage-800.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 400; font-display: block; src: url("../fonts/hanken-400.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 600; font-display: block; src: url("../fonts/hanken-600.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 400; font-display: block; src: url("../fonts/plexmono-400.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 600; font-display: block; src: url("../fonts/plexmono-600.woff2") format("woff2"); }

      #reel-2 { position: absolute; inset: 0; background: #070a08; font-family: "Hanken Grotesk", sans-serif; overflow: hidden; }
      #reel-2 .scene-content { position: relative; width: 100%; height: 100%; box-sizing: border-box; padding: 120px 64px; display: flex; flex-direction: column; justify-content: center; gap: 30px; }

      /* background — warm radial glow + faint honeycomb hex */
      #reel-2 .bg-glow { position: absolute; left: 50%; top: 120px; width: 1200px; height: 1200px; transform: translateX(-50%); background: radial-gradient(circle, rgba(255, 107, 94, 0.16), rgba(255, 200, 87, 0.08) 38%, rgba(7, 10, 8, 0) 64%); pointer-events: none; }
      #reel-2 .hive-ghost { position: absolute; right: -150px; top: 90px; width: 640px; height: 640px; fill: none; stroke: #2a3c30; stroke-width: 3; opacity: 0.5; pointer-events: none; }
      #reel-2 .reg { position: absolute; font-family: "IBM Plex Mono", monospace; font-size: 22px; letter-spacing: 0.16em; color: #5e7568; text-transform: uppercase; }
      #reel-2 .reg--tl { left: 64px; top: 70px; }
      #reel-2 .reg--br { right: 64px; bottom: 70px; }

      /* header */
      #reel-2 .head { display: flex; flex-direction: column; gap: 22px; }
      #reel-2 .kicker { font-family: "IBM Plex Mono", monospace; font-size: 26px; letter-spacing: 0.3em; color: #ffc857; }
      #reel-2 .headline { margin: 0; font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 76px; letter-spacing: -0.015em; color: #eafbf1; line-height: 1.02; }

      /* vertical stack of failure rows */
      #reel-2 .stack { display: flex; flex-direction: column; gap: 28px; margin-top: 14px; }
      #reel-2 .row { position: relative; display: flex; align-items: center; gap: 26px; background: #0b0f0c; border: 2px solid rgba(255, 107, 94, 0.42); border-radius: 14px; padding: 22px 26px; box-shadow: 0 40px 100px -36px rgba(0, 0, 0, 0.82), 0 0 70px -34px rgba(255, 107, 94, 0.22); }
      #reel-2 .row2 { border-color: rgba(255, 200, 87, 0.42); box-shadow: 0 40px 100px -36px rgba(0, 0, 0, 0.82), 0 0 70px -34px rgba(255, 200, 87, 0.22); }

      /* svg icon tile */
      #reel-2 .icon-box { position: relative; flex: none; width: 58px; height: 58px; border-radius: 16px; border: 2px solid; display: grid; place-items: center; }
      #reel-2 .icon-box .fx { position: absolute; inset: -7px; border-radius: 20px; opacity: 0; pointer-events: none; }
      #reel-2 .row1 .icon-box, #reel-2 .row3 .icon-box { color: #ff6b5e; border-color: rgba(255, 107, 94, 0.5); background: rgba(255, 107, 94, 0.08); }
      #reel-2 .row2 .icon-box { color: #ffc857; border-color: rgba(255, 200, 87, 0.5); background: rgba(255, 200, 87, 0.08); }
      #reel-2 .row1 .fx, #reel-2 .row3 .fx { background: radial-gradient(circle, rgba(255, 107, 94, 0.5), rgba(255, 107, 94, 0) 66%); }
      #reel-2 .row2 .fx { background: radial-gradient(circle, rgba(255, 200, 87, 0.5), rgba(255, 200, 87, 0) 66%); }
      #reel-2 .ico { width: 36px; height: 36px; display: block; }
      #reel-2 .ico rect, #reel-2 .ico path, #reel-2 .ico ellipse, #reel-2 .ico circle { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      #reel-2 .ico .solid { fill: #0b0f0c; }

      /* row body */
      #reel-2 .row-body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
      #reel-2 .row-title { margin: 0; font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 42px; letter-spacing: -0.01em; color: #eafbf1; line-height: 1; }
      #reel-2 .code { font-family: "IBM Plex Mono", monospace; font-size: 30px; line-height: 1.3; color: #91a89a; background: #0f1511; border: 2px solid #1d2a22; border-radius: 10px; padding: 14px 18px; white-space: nowrap; overflow: hidden; }
      #reel-2 .cmuted { color: #91a89a; }
      #reel-2 .cpath { color: #eafbf1; }
      #reel-2 .cgreen { color: #9fffc2; }
      #reel-2 .camber { color: #ffc857; }
      #reel-2 .cdanger { color: #ff6b5e; font-weight: 600; }
      #reel-2 .note { margin: 0; font-family: "Hanken Grotesk", sans-serif; font-weight: 600; font-size: 26px; color: #ff6b5e; }
      #reel-2 .row2 .note { color: #ffc857; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // background settles first — honeycomb drifts in, warm glow blooms
      tl.fromTo('#reel-2 .hive-ghost', { opacity: 0, rotate: -8, transformOrigin: "70% 30%" }, { opacity: 0.5, rotate: 0, duration: 0.8, ease: "sine.out" }, 0.2);
      tl.fromTo('#reel-2 .bg-glow', { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.7, ease: "power1.out" }, 0.25);

      // header — kicker tightens, headline lifts large
      tl.fromTo('#reel-2 .kicker', { opacity: 0, letterSpacing: "0.6em" }, { opacity: 1, letterSpacing: "0.3em", duration: 0.6, ease: "power2.out" }, 0.35);
      tl.fromTo('#reel-2 .headline', { opacity: 0, y: 52 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.5);

      // corner metadata marks
      tl.fromTo('#reel-2 .reg--tl', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "none" }, 0.7);
      tl.fromTo('#reel-2 .reg--br', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "none" }, 0.85);

      // the three failure rows stagger in — varied direction, ease, scale
      tl.fromTo('#reel-2 .row1', { opacity: 0, x: -56, scale: 0.96 }, { opacity: 1, x: 0, scale: 1, duration: 0.55, ease: "back.out(1.7)" }, 1.0);
      tl.fromTo('#reel-2 .row2', { opacity: 0, y: 56, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "expo.out" }, 1.16);
      tl.fromTo('#reel-2 .row3', { opacity: 0, x: 56, scale: 0.96 }, { opacity: 1, x: 0, scale: 1, duration: 0.55, ease: "back.out(1.7)" }, 1.32);

      // svg icon tiles pop in with a glow flash
      tl.fromTo('#reel-2 .row1 .icon-box', { opacity: 0, scale: 0.5, transformOrigin: "center" }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.6)" }, 1.28);
      tl.fromTo('#reel-2 .row1 .fx', { opacity: 0, scale: 0.6 }, { opacity: 0.9, scale: 1.16, duration: 0.3, ease: "power2.out" }, 1.32);
      tl.to('#reel-2 .row1 .fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 1.64);

      tl.fromTo('#reel-2 .row2 .icon-box', { opacity: 0, scale: 0.5, transformOrigin: "center" }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.6)" }, 1.44);
      tl.fromTo('#reel-2 .row2 .fx', { opacity: 0, scale: 0.6 }, { opacity: 0.9, scale: 1.16, duration: 0.3, ease: "power2.out" }, 1.48);
      tl.to('#reel-2 .row2 .fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 1.8);

      tl.fromTo('#reel-2 .row3 .icon-box', { opacity: 0, scale: 0.5, transformOrigin: "center" }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.6)" }, 1.6);
      tl.fromTo('#reel-2 .row3 .fx', { opacity: 0, scale: 0.6 }, { opacity: 0.9, scale: 1.16, duration: 0.3, ease: "power2.out" }, 1.64);
      tl.to('#reel-2 .row3 .fx', { opacity: 0, duration: 0.55, ease: "power2.in" }, 1.96);

      // code lines resolve a touch after their rows land
      tl.fromTo('#reel-2 .code', { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out", stagger: 0.12 }, 1.7);

      // danger notes punch in last — the verdict per row
      tl.fromTo('#reel-2 .note', { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.34, ease: "power1.out", stagger: 0.1 }, 2.2);

      // breathe — warm glow swells once on the hold (finite yoyo)
      tl.to('#reel-2 .bg-glow', { opacity: 0.8, scale: 1.06, duration: 1.1, ease: "sine.inOut", yoyo: true, repeat: 3 }, 3.4);

      window.__timelines["reel-2"] = tl;
    </script>
  </div>
</template>
