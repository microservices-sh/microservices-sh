<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>microservices.sh — reel</title>
    <style>
      html, body { margin: 0; padding: 0; background: #070a08; }
    </style>
  </head>
  <body>
    <div data-composition-id="root" data-start="0" data-duration="36" data-width="1080" data-height="1920">
      <!-- ── vertical scenes (alternating tracks for crossfade overlap) ── -->
      <div id="rclip-1" data-composition-id="reel-1" data-composition-src="compositions/reel-1.html" data-start="0"    data-duration="6" data-track-index="1"></div>
      <div id="rclip-2" data-composition-id="reel-2" data-composition-src="compositions/reel-2.html" data-start="5.6"  data-duration="6" data-track-index="2"></div>
      <div id="rclip-3" data-composition-id="reel-3" data-composition-src="compositions/reel-3.html" data-start="11.2" data-duration="6" data-track-index="1"></div>
      <div id="rclip-4" data-composition-id="reel-4" data-composition-src="compositions/reel-4.html" data-start="16.8" data-duration="7" data-track-index="2"></div>
      <div id="rclip-5" data-composition-id="reel-5" data-composition-src="compositions/reel-5.html" data-start="23.4" data-duration="6" data-track-index="1"></div>
      <div id="rclip-6" data-composition-id="reel-6" data-composition-src="compositions/reel-6.html" data-start="29"   data-duration="7" data-track-index="2"></div>

      <!-- ── voiceover ── -->
      <audio id="rvo-1" src="assets/vo/r1.mp3" data-start="0.4"  data-duration="4"   data-track-index="5" data-volume="1"></audio>
      <audio id="rvo-2" src="assets/vo/r2.mp3" data-start="6"    data-duration="4.8" data-track-index="5" data-volume="1"></audio>
      <audio id="rvo-3" src="assets/vo/r3.mp3" data-start="11.6" data-duration="3.4" data-track-index="5" data-volume="1"></audio>
      <audio id="rvo-4" src="assets/vo/r4.mp3" data-start="17.2" data-duration="4.3" data-track-index="5" data-volume="1"></audio>
      <audio id="rvo-5" src="assets/vo/r5.mp3" data-start="23.8" data-duration="3.6" data-track-index="5" data-volume="1"></audio>
      <audio id="rvo-6" src="assets/vo/r6.mp3" data-start="29.4" data-duration="5.5" data-track-index="5" data-volume="1"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const root = gsap.timeline({ paused: true });

      // 0.4s crossfades at each scene boundary
      root.to('#rclip-1', { opacity: 0, duration: 0.4, ease: "power1.inOut" }, 5.6);
      root.fromTo('#rclip-2', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power1.inOut" }, 5.6);
      root.to('#rclip-2', { opacity: 0, duration: 0.4, ease: "power1.inOut" }, 11.2);
      root.fromTo('#rclip-3', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power1.inOut" }, 11.2);
      root.to('#rclip-3', { opacity: 0, duration: 0.4, ease: "power1.inOut" }, 16.8);
      root.fromTo('#rclip-4', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power1.inOut" }, 16.8);
      root.to('#rclip-4', { opacity: 0, duration: 0.4, ease: "power1.inOut" }, 23.4);
      root.fromTo('#rclip-5', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power1.inOut" }, 23.4);
      root.to('#rclip-5', { opacity: 0, duration: 0.4, ease: "power1.inOut" }, 29);
      root.fromTo('#rclip-6', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power1.inOut" }, 29);

      window.__timelines["root"] = root;
    </script>
  </body>
</html>
