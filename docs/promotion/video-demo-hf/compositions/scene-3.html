<template id="scene-3-template">
  <div id="scene-3" data-composition-id="scene-3" data-width="1920" data-height="1080">
    <div class="scene-content">
      <!-- background layers -->
      <div class="bg-glow" aria-hidden="true"></div>
      <svg class="hive-ghost" viewBox="0 0 600 600" aria-hidden="true">
        <path d="M300 60 L470 158 L470 354 L300 452 L130 354 L130 158 Z" />
        <path d="M300 160 L385 209 L385 307 L300 356 L215 307 L215 209 Z" />
      </svg>
      <span class="reg reg--tl" aria-hidden="true">+ studio</span>
      <span class="reg reg--br" aria-hidden="true">microservices ▸ create</span>

      <!-- header zone -->
      <div class="head">
        <span class="kicker">STEP 03 · COMPOSE</span>
        <h1 class="headline">Compose them — don't&nbsp;regenerate&nbsp;them.</h1>
      </div>

      <!-- terminal -->
      <div class="term">
        <div class="term-bar">
          <span class="dots"><i></i><i></i><i></i></span>
          <span class="term-title">studio ▸ create</span>
        </div>
        <div class="term-body">
          <div class="row row--prompt"><span class="arrow">❯</span><span class="prog">pnpm create</span><span class="args">&nbsp;microservices-app@latest \</span></div>
          <div class="row row--cont"><span class="args">studio-booking --template booking-sveltekit</span></div>
          <div class="row row--ok r1"><span class="ic ic--ok">✓</span><span class="rk">scaffolding</span><span class="rv">studio · booking template</span></div>
          <div class="row row--ok r2"><span class="ic ic--ok">✓</span><span class="rk">modules</span><span class="rv">auth · customer · payment · email · booking</span></div>
          <div class="row row--ok r3"><span class="ic ic--ok">✓</span><span class="rk">contracts wired</span><span class="rv">typed</span></div>
          <div class="divider"></div>
          <div class="row row--ready">
            <span class="ok-glow" aria-hidden="true"></span>
            <span class="ic ic--ok ic--ready">✓</span><span class="rready">ready</span><span class="rnote">source-visible · yours</span>
          </div>
        </div>
      </div>
    </div>

    <style>
      @font-face { font-family: "Bricolage Grotesque"; font-weight: 800; font-display: block; src: url("../fonts/bricolage-800.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 400; font-display: block; src: url("../fonts/hanken-400.woff2") format("woff2"); }
      @font-face { font-family: "Hanken Grotesk"; font-weight: 600; font-display: block; src: url("../fonts/hanken-600.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 400; font-display: block; src: url("../fonts/plexmono-400.woff2") format("woff2"); }
      @font-face { font-family: "IBM Plex Mono"; font-weight: 600; font-display: block; src: url("../fonts/plexmono-600.woff2") format("woff2"); }

      #scene-3 {
        position: absolute;
        inset: 0;
        background: #070a08;
        font-family: "Hanken Grotesk", sans-serif;
        overflow: hidden;
      }
      #scene-3 .scene-content {
        position: relative;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 92px 110px;
        display: flex;
        flex-direction: column;
        gap: 48px;
      }

      /* background */
      #scene-3 .bg-glow {
        position: absolute;
        right: -160px;
        top: 200px;
        width: 1100px;
        height: 1100px;
        background: radial-gradient(circle, rgba(56, 255, 136, 0.16), rgba(7, 10, 8, 0) 60%);
        pointer-events: none;
      }
      #scene-3 .hive-ghost {
        position: absolute;
        left: -120px;
        bottom: -160px;
        width: 760px;
        height: 760px;
        fill: none;
        stroke: #2a3c30;
        stroke-width: 3;
        opacity: 0.5;
        pointer-events: none;
      }
      #scene-3 .reg {
        position: absolute;
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        letter-spacing: 0.16em;
        color: #5e7568;
        text-transform: uppercase;
      }
      #scene-3 .reg--tl { left: 110px; top: 52px; }
      #scene-3 .reg--br { right: 110px; bottom: 52px; }

      /* header */
      #scene-3 .head { display: flex; flex-direction: column; gap: 18px; }
      #scene-3 .kicker {
        font-family: "IBM Plex Mono", monospace;
        font-size: 24px;
        letter-spacing: 0.3em;
        color: #38ff88;
      }
      #scene-3 .headline {
        margin: 0;
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 66px;
        letter-spacing: -0.015em;
        color: #eafbf1;
        line-height: 1.02;
      }

      /* terminal */
      #scene-3 .term {
        position: relative;
        background: #0b0f0c;
        border: 2px solid #2a3c30;
        border-radius: 16px;
        box-shadow: 0 50px 130px -30px rgba(0, 0, 0, 0.85), 0 0 90px -30px rgba(56, 255, 136, 0.18);
        overflow: hidden;
      }
      #scene-3 .term-bar {
        display: flex;
        align-items: center;
        gap: 22px;
        padding: 20px 30px;
        background: #0f1511;
        border-bottom: 2px solid #1d2a22;
      }
      #scene-3 .dots { display: inline-flex; gap: 11px; }
      #scene-3 .dots i {
        width: 16px; height: 16px; border-radius: 999px; background: #2a3c30; display: block;
      }
      #scene-3 .term-title {
        font-family: "IBM Plex Mono", monospace;
        font-size: 24px;
        color: #91a89a;
      }
      #scene-3 .term-body {
        padding: 38px 44px 42px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 34px;
        line-height: 1.4;
      }
      #scene-3 .row { display: flex; align-items: baseline; gap: 22px; }
      #scene-3 .row--prompt { color: #eafbf1; }
      #scene-3 .row--cont { color: #91a89a; padding-left: 46px; margin-bottom: 6px; }
      #scene-3 .arrow { color: #38ff88; font-weight: 600; }
      #scene-3 .prog { color: #9fffc2; }
      #scene-3 .args { color: #91a89a; }
      #scene-3 .ic { width: 36px; flex: 0 0 36px; text-align: center; font-weight: 700; }
      #scene-3 .ic--ok { color: #38ff88; }
      #scene-3 .rk { width: 330px; flex: 0 0 330px; color: #5e7568; }
      #scene-3 .rv { color: #9fffc2; }
      #scene-3 .divider { height: 2px; background: #1d2a22; margin: 14px 0 6px; }

      /* final emphasized success line */
      #scene-3 .row--ready {
        position: relative;
        margin: 4px -16px;
        padding: 14px 16px;
        border-radius: 10px;
        background: rgba(56, 255, 136, 0.08);
      }
      #scene-3 .ok-glow {
        position: absolute;
        inset: -2px -10px;
        border-radius: 12px;
        background: radial-gradient(ellipse at 8% 50%, rgba(0, 245, 122, 0.32), rgba(0, 245, 122, 0) 55%);
        pointer-events: none;
        opacity: 0;
        z-index: 0;
      }
      #scene-3 .ic--ready { color: #00f57a; }
      #scene-3 .rready {
        color: #00f57a;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      #scene-3 .rnote { color: #5e7568; }
      #scene-3 .row--ready .ic,
      #scene-3 .row--ready .rready,
      #scene-3 .row--ready .rnote { position: relative; z-index: 1; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // header
      tl.fromTo('#scene-3 .kicker', { opacity: 0, letterSpacing: "0.6em" }, { opacity: 1, letterSpacing: "0.3em", duration: 0.6, ease: "power2.out" }, 0.25);
      tl.fromTo('#scene-3 .headline', { opacity: 0, y: 46 }, { opacity: 1, y: 0, duration: 0.75, ease: "power3.out" }, 0.4);

      // terminal frame rises + scales in
      tl.fromTo('#scene-3 .term', { opacity: 0, y: 64, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 0.8, ease: "expo.out" }, 0.6);
      tl.fromTo('#scene-3 .term-bar', { opacity: 0 }, { opacity: 1, duration: 0.45, ease: "none" }, 1.05);

      // prompt
      tl.fromTo('#scene-3 .row--prompt', { opacity: 0, x: -26 }, { opacity: 1, x: 0, duration: 0.42, ease: "power2.out" }, 1.35);
      tl.fromTo('#scene-3 .row--cont', { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.38, ease: "power2.out" }, 1.55);

      // ok rows cascade — varied directions
      tl.fromTo('#scene-3 .r1', { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.32, ease: "power1.out" }, 1.8);
      tl.fromTo('#scene-3 .r2', { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.32, ease: "power1.out" }, 2.05);
      tl.fromTo('#scene-3 .r3', { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.32, ease: "power1.out" }, 2.3);

      // divider sweeps open
      tl.fromTo('#scene-3 .divider', { scaleX: 0, transformOrigin: "left center" }, { scaleX: 1, duration: 0.5, ease: "power2.inOut" }, 2.75);

      // final success line lands with confidence
      tl.fromTo('#scene-3 .row--ready', { opacity: 0, y: 20, scale: 0.93 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.9)" }, 3.1);
      tl.fromTo('#scene-3 .ok-glow', { opacity: 0, scale: 0.9 }, { opacity: 0.9, scale: 1, duration: 0.5, ease: "power2.out" }, 3.25);

      // breathe — soft glow pulse on the success line (finite)
      tl.to('#scene-3 .ok-glow', { opacity: 0.5, scale: 1.05, duration: 0.95, ease: "sine.inOut", yoyo: true, repeat: 3 }, 3.95);

      window.__timelines["scene-3"] = tl;
    </script>
  </div>
</template>
